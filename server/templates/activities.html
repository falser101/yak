<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>活动管理 - 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #07c160, #10b981);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(7, 193, 96, 0.2);
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      font-size: 14px;
      margin-left: 10px;
      transition: background 0.3s;
    }
    .header a:hover { background: rgba(255,255,255,0.3); }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* 统计卡片 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .stat-icon.green { background: #e6f7e6; }
    .stat-icon.orange { background: #fff3e0; }
    .stat-icon.blue { background: #e3f2fd; }
    .stat-info h3 {
      font-size: 28px;
      font-weight: 600;
      color: #333;
    }
    .stat-info p {
      font-size: 14px;
      color: #999;
      margin-top: 4px;
    }

    /* 主卡片 */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .card-header h2 {
      font-size: 18px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
      font-weight: 500;
    }
    .btn-primary {
      background: linear-gradient(135deg, #07c160, #10b981);
      color: white;
      box-shadow: 0 2px 8px rgba(7, 193, 96, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(7, 193, 96, 0.4);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-danger { background: #ff4d4f; color: white; }
    .btn-danger:hover { background: #ff4d4f; }

    /* 表格样式 */
    .table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #fafafa;
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      color: #555;
      font-size: 13px;
      border-bottom: 2px solid #f0f0f0;
    }
    td {
      padding: 16px;
      font-size: 14px;
      border-bottom: 1px solid #f5f5f5;
    }
    tr:hover {
      background: #fafafa;
    }

    /* 状态标签 */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-0 { background: #e6f7e6; color: #07c160; }
    .status-1 { background: #fff3e0; color: #ff9800; }
    .status-2 { background: #f5f5f5; color: #999; }

    .actions {
      display: flex;
      gap: 8px;
    }

    /* 分页样式 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #f0f0f0;
    }
    .pagination button {
      padding: 8px 14px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) {
      background: #07c160;
      color: white;
      border-color: #07c160;
    }
    .pagination button.active {
      background: #07c160;
      color: white;
      border-color: #07c160;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination .info {
      color: #666;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 16px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 12px;
      }
      .stats-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚴 骑行活动管理后台</h1>
    <div>
      <a href="/admin/activities">活动管理</a>
      <a href="/admin/logout">退出</a>
    </div>
  </div>

  <div class="container">
    <!-- 统计卡片 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon green">📋</div>
        <div class="stat-info">
          <h3 id="totalCount">-</h3>
          <p>总活动数</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📢</div>
        <div class="stat-info">
          <h3 id="activeCount">-</h3>
          <p>报名中</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">👥</div>
        <div class="stat-info">
          <h3 id="signupCount">-</h3>
          <p>总报名人数</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>📝 活动列表</h2>
        <a href="/admin/activities/new" class="btn btn-primary">
          <span>+</span> 发布新活动
        </a>
      </div>

      <div id="loading" class="loading">加载中...</div>

      <div class="table-container">
        <table id="activityTable" style="display: none;">
          <thead>
            <tr>
              <th>ID</th>
              <th>活动标题</th>
              <th>时间</th>
              <th>地点</th>
              <th>人数</th>
              <th>费用</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="activityBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="icon">📭</div>
          <p>暂无活动数据</p>
          <a href="/admin/activities/new" class="btn btn-primary" style="margin-top: 16px;">发布第一个活动</a>
        </div>
      </div>

      <div id="pagination" class="pagination" style="display: none;"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/admin/api';
    const PAGE_SIZE = 10;

    let currentPage = 1;
    let totalPages = 1;
    let total = 0;
    let allStats = { total: 0, active: 0, signups: 0 };

    const statusMap = {
      0: { text: '报名中', class: 'status-0', icon: '🟢' },
      1: { text: '已满', class: 'status-1', icon: '🟠' },
      2: { text: '已结束', class: 'status-2', icon: '⚫' }
    };

    function loadActivities() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('activityTable').style.display = 'none';
      document.getElementById('pagination').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      fetch(`${API_BASE}/activities?page=${currentPage}&pageSize=${PAGE_SIZE}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('loading').style.display = 'none';
          renderTable(data.data || []);
          renderPagination(data.total || 0);
          updateStats(data);

          if (data.data && data.data.length > 0) {
            document.getElementById('activityTable').style.display = 'table';
          } else {
            document.getElementById('emptyState').style.display = 'block';
          }
        })
        .catch(err => {
          document.getElementById('loading').innerHTML = '加载失败：' + err.message;
        });
    }

    function updateStats(data) {
      allStats.total = data.total || 0;
      // 简单统计，实际应该从后端获取更详细的数据
      allStats.active = data.data ? data.data.filter(a => a.status === 0).length : 0;
      allStats.signups = data.data ? data.data.reduce((sum, a) => sum + (a.signupCount || 0), 0) : 0;

      document.getElementById('totalCount').textContent = allStats.total;
      document.getElementById('activeCount').textContent = allStats.active;
      document.getElementById('signupCount').textContent = allStats.signups;
    }

    function renderTable(activities) {
      const tbody = document.getElementById('activityBody');

      if (activities.length === 0) {
        return;
      }

      tbody.innerHTML = activities.map(a => `
        <tr>
          <td style="color: #999;">#${a.id}</td>
          <td style="font-weight: 500; max-width: 250px;">${escapeHtml(a.title)}</td>
          <td>${formatDate(a.date)}</td>
          <td style="max-width: 150px;">${escapeHtml(a.location)}</td>
          <td>
            <span style="font-weight: 500;">${a.signupCount}/${a.maxParticipants}</span>
            <span style="color: #999; font-size: 12px;">人</span>
          </td>
          <td style="color: #ff4d4f; font-weight: 500;">¥${a.price}</td>
          <td><span class="status ${statusMap[a.status].class}">${statusMap[a.status].icon} ${statusMap[a.status].text}</span></td>
          <td>
            <div class="actions">
              <a href="/admin/signups/${a.id}" class="btn btn-sm btn-secondary" title="查看报名">👥</a>
              <a href="/admin/activities/${a.id}/edit" class="btn btn-sm btn-secondary" title="编辑">✏️</a>
              <button onclick="deleteActivity(${a.id})" class="btn btn-sm btn-danger" title="删除">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      const month = (d.getMonth() + 1).toString().padStart(2, '0');
      const day = d.getDate().toString().padStart(2, '0');
      const hour = d.getHours().toString().padStart(2, '0');
      const min = d.getMinutes().toString().padStart(2, '0');
      return `${month}-${day} ${hour}:${min}`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderPagination(totalCount) {
      totalPages = Math.ceil(totalCount / PAGE_SIZE);
      total = totalCount;
      const container = document.getElementById('pagination');

      if (totalPages <= 1) {
        container.style.display = 'none';
        return;
      }

      let html = `
        <button onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
      `;

      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        html += `<button onclick="changePage(1)">1</button>`;
        if (startPage > 2) {
          html += `<span class="info">...</span>`;
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          html += `<span class="info">...</span>`;
        }
        html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
      }

      html += `
        <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
        <button onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
        <span class="info">共 ${total} 条 · 第 ${currentPage}/${totalPages} 页</span>
      `;

      container.innerHTML = html;
      container.style.display = 'flex';
    }

    function changePage(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      currentPage = page;
      loadActivities();
    }

    function deleteActivity(id) {
      if (!confirm('确定要删除这个活动吗？删除后无法恢复！')) return;

      fetch('/admin/api/activities/' + id, { method: 'DELETE' })
        .then(res => {
          if (res.ok) {
            loadActivities();
          } else {
            alert('删除失败：' + res.statusText);
          }
        })
        .catch(err => {
          alert('删除失败：' + err.message);
        });
    }

    // 初始化加载
    loadActivities();
  </script>
</body>
</html>
