version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yak_postgres
    restart: always
    environment:
      POSTGRES_USER: yak
      POSTGRES_PASSWORD: yak123456
      POSTGRES_DB: yak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio
    container_name: yak_minio
    restart: always
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: yak
      MINIO_ROOT_PASSWORD: yak123456
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
